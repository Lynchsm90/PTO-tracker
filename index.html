<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTO Tracker Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-6 font-sans">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-r silver text-emerald-400 bg-clip-text">PTO Tracker Ledger</h1>
                <p class="text-gray-400 text-sm mt-1">Dynamic view synced with Supabase</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-lg text-right">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Current Balance</span>
                <div id="current-balance" class="text-2xl font-black text-emerald-400">0.00 hrs</div>
            </div>
        </header>

        <div class="bg-gray-800 rounded-xl border border-gray-700 shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-950 text-gray-300 text-xs font-bold uppercase tracking-wider border-b border-gray-700">
                            <th class="p-4">Period</th>
                            <th class="p-4">Work Period Start</th>
                            <th class="p-4">Work Period End</th>
                            <th class="p-4">Pay Date</th>
                            <th class="p-4 text-right">Starting Bal</th>
                            <th class="p-4 text-center">Used (Hrs)</th>
                            <th class="p-4 text-center">Days</th>
                            <th class="p-4 text-center">Accrual</th>
                            <th class="p-4 text-right text-emerald-400">Ending Bal</th>
                            <th class="p-4">Notes</th>
                            <th class="p-4">Extra Notes</th>
                        </tr>
                    </thead>
                    <tbody id="ledger-body" class="divide-y divide-gray-700 text-sm">
                        <tr>
                            <td colspan="11" class="p-8 text-center text-gray-500 animate-pulse">Connecting to Supabase database...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 1. Initialize Supabase using a unique instance variable name
        const SUPABASE_URL = 'https://qyatqnytdowltqatartn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5YXRxbnl0ZG93bHRxYXRhcnRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjU3NzcsImV4cCI6MjA5NzgwMTc3N30.a2KwIc8gnQpJH5NRNuYv8oMYl7IsHdRNq8jpXN3dojU';
        
        // This resolves the duplicate declaration crash:
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. Fetch data and calculate rolling timeline
        async function loadPTOTracker() {
            try {
                // Correctly referencing the custom initialized client name
                let { data: payPeriods, error } = await supabaseClient
                    .from('pay_periods')
                    .select('*')
                    .order('period_number', { ascending: true });

                if (error) throw error;

                const tbody = document.getElementById('ledger-body');
                tbody.innerHTML = ''; // Clear loading placeholder

                // Fallback layer if database table hasn't finished seeding yet
                if (!payPeriods || payPeriods.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="11" class="p-8 text-center text-gray-400">No records found. Seed your database to see rows.</td></tr>`;
                    return;
                }

                // Baseline math configs matching row 1 of your spreadsheet
                let runningBalance = 46.96; 

                // 3. Process the math and build table elements reactively
                payPeriods.forEach((row) => {
                    const startingBal = runningBalance;
                    const usedHours = row.hours_used || 0;
                    const usedDays = row.days_used || '';
                    const accrual = row.accrual_amount || 5;
                    const endingBal = startingBal - usedHours + accrual;
                    
                    runningBalance = endingBal;

                    // Row conditional style highlights if a trip/PTO is logged
                    const rowClass = usedHours > 0 
                        ? 'bg-emerald-950/40 border-l-4 border-emerald-500 transition-colors' 
                        : 'hover:bg-gray-750/50 transition-colors';

                    const tr = document.createElement('tr');
                    tr.className = rowClass;
                    tr.innerHTML = `
                        <td class="p-4 font-bold ${usedHours > 0 ? 'text-emerald-400' : 'text-gray-400'}">${row.period_number}</td>
                        <td class="p-4 text-gray-300">${new Date(row.start_date).toLocaleDateString()}</td>
                        <td class="p-4 text-gray-400">${new Date(row.end_date).toLocaleDateString()}</td>
                        <td class="p-4 text-gray-400">${new Date(row.pay_date).toLocaleDateString()}</td>
                        <td class="p-4 text-right font-mono text-gray-400">${startingBal.toFixed(2)}</td>
                        <td class="p-4 text-center font-mono font-semibold ${usedHours > 0 ? 'text-amber-400' : 'text-gray-500'}">${usedHours}</td>
                        <td class="p-4 text-center text-gray-400">${usedDays}</td>
                        <td class="p-4 text-center font-mono text-gray-400">${accrual}</td>
                        <td class="p-4 text-right font-mono font-bold text-emerald-400">${endingBal.toFixed(2)}</td>
                        <td class="p-4 font-medium text-gray-200">${row.notes || ''}</td>
                        <td class="p-4 text-xs text-gray-400 italic">${row.extra_notes || ''}</td>
                    `;
                    tbody.appendChild(tr);
                });

                // Update active balance badge layout with calculated result
                document.getElementById('current-balance').innerText = `${runningBalance.toFixed(2)} hrs`;

            } catch (err) {
                console.error("Database connection failed:", err);
                document.getElementById('ledger-body').innerHTML = `
                    <tr>
                        <td colspan="11" class="p-8 text-center text-red-400">
                            <strong>Failed to connect to backend:</strong> ${err.message}<br>
                            <span class="text-xs text-gray-500">Ensure URL/API keys match and schema exists.</span>
                        </td>
                    </tr>`;
            }
        }

        // Mount tracker app
        loadPTOTracker();
    </script>
</body>
</html>
